<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Leadger</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo">
                <span class="logo-text">Leadger</span>
                <span class="logo-sub">ACCOUNTING SYSTEM</span>
            </div>
            <h1>Welcome back</h1>
        </div>
        
        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="email">EMAIL</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="you@company.com"
                    required
                    autocomplete="email"
                >
            </div>
            
            <div class="form-group">
                <label for="password">PASSWORD</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="••••••••"
                    required
                    autocomplete="current-password"
                >
            </div>
            
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            
            <button type="submit" class="btn-primary" id="loginBtn">
                Sign In
            </button>
        </form>
        
        <div class="auth-footer">
            <button type="button" class="btn-ghost" onclick="location.href='{{ url_for('signup') }}'">
                Create an account
            </button>
            <a href="#" class="link-subtle">Forgot password?</a>
        </div>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const btn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMessage');
    
    // Deshabilitar botón y mostrar loading
    btn.disabled = true;
    btn.textContent = 'Signing in...';
    errorMsg.style.display = 'none';
    
    const formData = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
    };
    
    try {
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        });
        
        const data = await response.json();
        
        if (data.success) {
            // Redirigir al dashboard
            window.location.href = '/app';
        } else {
            // Mostrar error
            errorMsg.textContent = data.error || 'Invalid credentials';
            errorMsg.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    } catch (error) {
        errorMsg.textContent = 'Connection error. Please try again.';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
    }
});
</script>

</body>
</html>
